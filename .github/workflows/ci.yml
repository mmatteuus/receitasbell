name: CI
on:
  pull_request:
    branches: [main]
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
  check-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count API functions
        run: |
          COUNT=$(find api -name "*.ts" | wc -l)
          echo "Functions: $COUNT / 12"
          if [ "$COUNT" -gt 12 ]; then exit 1; fi
