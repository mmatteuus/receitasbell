openapi: 3.1.0
info:
  title: Receitas Bell Payments API
  version: 1.0.0
  summary: Stripe-only payment domain
servers:
  - url: https://{host}
    variables:
      host:
        default: example.com
tags:
  - name: payments
  - name: connect
  - name: admin
paths:
  /api/payments/connect/account:
    post:
      tags: [connect]
      summary: Cria ou recupera a conta conectada Stripe do tenant
      responses:
        '200':
          description: Conta conectada disponível
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectStatus'
        '409':
          $ref: '#/components/responses/Problem'
  /api/payments/connect/onboarding-link:
    post:
      tags: [connect]
      summary: Gera link de onboarding admin-only
      responses:
        '200':
          description: Link gerado
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
        '409':
          $ref: '#/components/responses/Problem'
  /api/payments/connect/status:
    get:
      tags: [connect]
      summary: Retorna readiness da conta conectada
      responses:
        '200':
          description: Status da conta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectStatus'
  /api/payments/products/sync:
    post:
      tags: [admin]
      summary: Sincroniza produto/preço local com Stripe
      responses:
        '200':
          description: Sincronizado
          content:
            application/json:
              schema:
                type: object
                required: [recipeId, stripeProductId, stripePriceId, status]
                properties:
                  recipeId: { type: string }
                  stripeProductId: { type: string }
                  stripePriceId: { type: string }
                  status: { type: string, enum: [synced] }
        '422':
          $ref: '#/components/responses/Problem'
  /api/payments/checkout/session:
    post:
      tags: [payments]
      summary: Cria Checkout Session Stripe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutSessionRequest'
      responses:
        '201':
          description: Sessão criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutSessionResponse'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /api/payments/webhooks/stripe:
    post:
      tags: [payments]
      summary: Recebe eventos Stripe
      responses:
        '200':
          description: Evento processado
          content:
            application/json:
              schema:
                type: object
                required: [received]
                properties:
                  received: { type: boolean }
        '400':
          $ref: '#/components/responses/Problem'
  /api/payments/jobs/reconcile:
    post:
      tags: [admin]
      summary: Repair manual de pedidos/eventos
      responses:
        '200':
          description: Repair executado
          content:
            application/json:
              schema:
                type: object
                properties:
                  repaired:
                    type: integer
components:
  schemas:
    CreateCheckoutSessionRequest:
      type: object
      required: [tenantId, recipeIds, buyerEmail, checkoutReference]
      properties:
        tenantId:
          type: string
        recipeIds:
          type: array
          items: { type: string }
          minItems: 1
        buyerEmail:
          type: string
          format: email
        checkoutReference:
          type: string
    CreateCheckoutSessionResponse:
      type: object
      required:
        - paymentOrderId
        - provider
        - checkoutUrl
        - providerCheckoutId
        - status
      properties:
        paymentOrderId: { type: string }
        provider: { type: string, enum: [stripe] }
        checkoutUrl: { type: string, format: uri }
        providerCheckoutId: { type: string }
        status: { type: string, enum: [created, pending] }
    ConnectStatus:
      type: object
      required:
        - provider
        - connected
        - status
        - chargesEnabled
        - payoutsEnabled
      properties:
        provider: { type: string, enum: [stripe] }
        connected: { type: boolean }
        status: { type: string, enum: [missing, pending, ready, reconnect_required, disconnected] }
        accountId: { type: string, nullable: true }
        chargesEnabled: { type: boolean }
        payoutsEnabled: { type: boolean }
        detailsSubmitted: { type: boolean, nullable: true }
        currentlyDue:
          type: array
          items: { type: string }
    Problem:
      type: object
      required: [type, title, status, detail, request_id, timestamp]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        request_id: { type: string }
        timestamp: { type: string, format: date-time }
  responses:
    Problem:
      description: Problem Details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
