trigger_definitions:
  READY_FOR_EXECUTOR: proximo passo autorizado para execucao
  EXECUTOR_IN_PROGRESS: executor assumiu o passo e esta executando
  EXECUTOR_DONE_AWAITING_REVIEW: executor terminou e aguarda validacao
  REVIEW_APPROVED: passo aprovado pelo pensante
  REVIEW_CHANGES_REQUIRED: mesmo passo deve ser corrigido e repetido
  ROLLBACK_REQUIRED: rollback obrigatorio antes de avancar
  BLOCKED: existe impedimento externo ou falta de evidencia
  DONE: objetivo final encerrado

handoff_rules:
  - somente o current_owner pode agir
  - apenas um passo por vez
  - nao pular passo
  - nao executar sem rollback definido quando houver risco
  - toda resposta precisa conter evidencias
  - sem evidencias o trigger nao pode mudar para REVIEW_APPROVED

