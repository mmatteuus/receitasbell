openapi: 3.1.0
info:
  title: Receitas Bell API
  version: 1.0.0
  description: Esqueleto de contrato a partir das rotas evidenciadas em código e documentação.
servers:
- url: https://receitasbell-matdev.vercel.app
paths:
  /api/auth/login-password:
    post:
      summary: Autentica usuário por email e senha
      responses:
        '200':
          description: Sessão criada
        '400':
          description: Payload inválido
        '401':
          description: Credenciais inválidas
  /api/public/catalog:
    get:
      summary: Lista catálogo público do tenant
      parameters:
      - name: q
        in: query
        schema:
          type: string
      - name: categorySlug
        in: query
        schema:
          type: string
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Catálogo retornado
  /api/admin/settings:
    get:
      summary: Consulta settings do tenant admin
      responses:
        '200':
          description: OK
        '401':
          description: Não autenticado
    patch:
      summary: Atualiza settings do tenant admin
      responses:
        '200':
          description: Atualizado
        '401':
          description: Não autenticado
        '405':
          description: Método não permitido
  /api/health:
    get:
      summary: Health endpoint canônico
      responses:
        '200':
          description: OK
        '503':
          description: Degradado
  /api/health/live:
    get:
      summary: Liveness
      responses:
        '200':
          description: OK
  /api/health/ready:
    get:
      summary: Readiness
      responses:
        '200':
          description: OK
        '503':
          description: Dependência indisponível
components:
  schemas:
    Problem:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        requestId:
          type: string
